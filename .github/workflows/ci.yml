name: CI

# step-6a
on:
  push:
    branches: [main]

env:
  IMAGE_NAME: workshop-app

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # step-6b
      - name: Build image
        run: docker build --pull -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # step-6c (มีให้แล้ว)
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      # step-6d (login)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # step-6e
      - name: Tag and push
        run: |
          FULL=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} $FULL:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} $FULL:latest
          docker push $FULL:${{ github.sha }}
          docker push $FULL:latest